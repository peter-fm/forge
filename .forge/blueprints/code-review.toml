# forge-generated
[blueprint]
name = "code-review"
description = "Review an existing pull request and post feedback via GitHub"

[[step]]
type = "deterministic"
name = "checkout-pr"
command = "gh pr checkout {pr}"

[[step]]
type = "agentic"
name = "review"
agent = "{target_agent}"
model = "{target_model}"
prompt = """Review pull request #{pr} carefully.

1. Read the PR details: `gh pr view {pr} --json title,body,files,commits,comments,reviews`.
2. Read the diff against the default branch: `git diff {default_branch}...HEAD`.
3. Review for bugs, regressions, missing tests, style inconsistencies, and design issues.
4. Post your review with `gh pr review {pr}`:
   - If you found issues, leave a comment review that explains the problems clearly.
   - If the PR looks good, approve it with a short rationale.

Be specific and reference files or behaviors when calling out problems."""
