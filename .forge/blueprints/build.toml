# forge-generated
[blueprint]
name = "build"
description = "Implement a task (feature or refactor) with lint and test gates"

[[step]]
type = "deterministic"
name = "clean-tree"
command = "git diff --quiet || exit 1"

[[step]]
type = "blueprint"
name = "verify-base"
blueprint = "verify-base"

[[step]]
type = "deterministic"
name = "create-branch"
command = "git checkout -b {branch}"

[[step]]
type = "agentic"
name = "build"
agent = "{target_agent}"
model = "{target_model}"
prompt = """Read your task instructions from {instruction_path}. Read ONLY your instruction file, not other agents' instructions. Implement the task described there. The instruction file defines scope — whether new behaviour, a refactor that preserves behaviour, or something else. Follow what it says."""
max_retries = 2

[[step]]
type = "deterministic"
name = "commit-backstop"
command = "git add -A && git diff --cached --quiet || git commit -m \"{commit_message}\""

[[step]]
type = "blueprint"
name = "verify"
blueprint = "lint-and-test"

[[step]]
type = "agentic"
name = "docs-check"
agent = "{target_agent}"
model = "{target_model}"
prompt = """Review the changes you just made and check if the project documentation needs updating.

1. Run `git diff {default_branch}...HEAD --name-only` to see what files changed.
2. Read README.md (if it exists) and check if any of these are now outdated:
   - Feature descriptions that no longer match the code
   - CLI usage examples that have changed
   - Installation instructions that need updating
   - Configuration options that were added or removed
   - Project structure sections that don't reflect new/moved files
3. Check docs/ directory (if it exists) for any files affected by your changes.
4. Check AGENTS.md (if it exists) for outdated workflow instructions.
5. If anything needs updating, make the changes.
6. If everything is already accurate, do nothing — don't make changes for the sake of it.

Only update documentation that is genuinely affected by the code changes. Do not rewrite docs that are still correct.
"""
allow_failure = true

[[step]]
type = "deterministic"
name = "docs-commit-backstop"
command = "git add -A && git diff --cached --quiet || git commit -m \"docs: update documentation\""

[[step]]
type = "deterministic"
name = "archive-instruction"
command = "if [ -f .forge/instructions/{instruction_file} ]; then mkdir -p .forge/archive && mv .forge/instructions/{instruction_file} .forge/archive/{instruction_file} && git rm -f --ignore-unmatch --quiet .forge/instructions/{instruction_file} && git add .forge/archive/{instruction_file} && git commit -m 'chore: archive {instruction_file}'; fi"

[[step]]
type = "deterministic"
name = "push-branch"
command = "git push origin {branch}"

[[step]]
type = "agentic"
name = "write-pr"
agent = "{target_agent}"
model = "{target_model}"
prompt = """You have just completed work on this branch. Now write up a pull request description.

1. Run `git diff {default_branch}...HEAD` to see everything you changed.
2. Read the original task instructions at {instruction_path}.
3. Write a PR description covering:
   - What problem this solves (from the task brief)
   - How you solved it (architectural decisions, key changes)
   - What changed (files modified, new files, removed files)
   - How to verify (what tests cover this, how to manually check)
4. Save the PR description to `.forge/pr-body.md`.

Do not create the PR yourself. Only write the contents for `.forge/pr-body.md`."""

[[step]]
type = "deterministic"
name = "create-pr"
command = "gh pr create --base {default_branch} --head {branch} --body-file .forge/pr-body.md --title \"{commit_message}\" && rm -f .forge/pr-body.md"

[[step]]
type = "deterministic"
name = "checkout-main"
command = "git checkout {default_branch}"

