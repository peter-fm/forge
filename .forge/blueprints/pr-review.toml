# forge-generated
[blueprint]
name = "pr-review"
description = "Senior engineer review of a PR — review implementation, merge to the default branch, run final tests"

[[step]]
type = "deterministic"
name = "clean-tree"
command = "git diff --quiet && git diff --cached --quiet"


[[step]]
type = "agentic"
name = "review"
agent = "codex"
model = "gpt-5.5"
prompt = """You are a senior engineer reviewing PR #{pr}.

1. Read the PR description:
   gh pr view {pr} --json title,body,additions,deletions,changedFiles

2. Check out the branch and read the full diff:
   gh pr checkout {pr}
   git diff {default_branch}...HEAD

3. Review the implementation from the standpoint of the system as a whole:
   - Does the design make sense in the context of the broader codebase?
   - Are there architectural concerns, coupling issues, or missed edge cases?
   - Is the code consistent with existing patterns and conventions?
   - Are tests adequate — do they cover the new behaviour and edge cases?
   - Is there anything the implementing agent missed or got wrong?

4. If you find issues:
   - Leave review comments via gh pr review {pr} --comment --body \"...\"
   - Be specific: reference files, lines, and explain why it matters
   - Distinguish blocking issues from suggestions

5. If the code is good (or after addressing issues):
   - Approve: gh pr review {pr} --approve --body \"LGTM — <brief summary>\""""
max_retries = 1

[[step]]
type = "agentic"
name = "address-blocking"
agent = "codex"
model = "gpt-5.5"
prompt = """Check whether the prior review step left any blocking comments on PR #{pr}, and if so, fix them. ONE pass only — do not iterate.

1. Fetch the latest review state:
   gh pr view {pr} --json reviews,comments,reviewDecision

2. Identify blocking items. A comment counts as blocking ONLY if:
   - The review state is CHANGES_REQUESTED, OR
   - The review/comment body explicitly uses the word \"blocking\" (or \"must fix\" / \"required\")
   Subjective suggestions (\"consider\", \"nit\", \"could\", \"might want to\") are NOT blocking — ignore them.

3. If there are no blocking items, do nothing and exit. This step is a no-op in that case.

4. If there are blocking items:
   - Make sure you are on the PR branch: gh pr checkout {pr}
   - Make the minimal changes needed to address each blocking item
   - Commit with a clear message referencing what was addressed
   - Push to the PR branch: git push
   - Reply on the PR summarising what you fixed: gh pr comment {pr} --body \"...\"

5. Do NOT re-trigger another review cycle. Do NOT address non-blocking suggestions. Cap: one fix pass."""
max_retries = 1
allow_failure = true

[[step]]
type = "agentic"
name = "merge"
agent = "codex"
model = "gpt-5.5"
prompt = """Merge PR #{pr} to the default branch.

1. First, try a clean merge:
   gh pr merge {pr} --squash --auto

2. If there are merge conflicts:
   - Check out the PR branch
   - Merge the default branch into it: git merge {default_branch}
   - Resolve conflicts carefully — understand both sides before choosing
   - Preserve the intent of both the PR and the conflicting changes
   - Commit the resolution and push
   - Then merge the PR

3. If conflicts are too complex to resolve safely, do NOT force merge.
   Instead, report what conflicts exist and stop."""
max_retries = 1

[[step]]
type = "deterministic"
name = "checkout-main"
command = "git checkout {default_branch} && git pull"

[[step]]
type = "blueprint"
name = "post-merge-verify"
blueprint = "lint-and-test"

