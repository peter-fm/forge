# forge-generated
[project]
type = "rust"
name = "forge"

[commands]
test = "cargo test"
lint = "cargo clippy -- -D warnings"
build = "cargo build"

[agent]
default = "codex"
model = "gpt-5.4"

[instructions]
directory = "instructions"
gitignore = true

[workspace]
instructions = "instructions"
archive = "archive"
auto_archive = true
