# forge-generated
[project]
type = "rust"
name = "forge"

[commands]
test = "cargo test"
lint = "cargo fmt --check && cargo clippy -- -D warnings"
build = "cargo build"

[agent]
default = "codex"
model = "gpt-5.5"
effort = "medium"

[instructions]
directory = "instructions"
gitignore = true

[workspace]
instructions = "instructions"
archive = "archive"
auto_archive = false

[dashboard]
# Frontend hasn't shipped yet, so the dashboard is opt-in for now.
enabled = false
